<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - Prática de Validação JS</title>
</head>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f6f9;
        margin: 0;
        padding: 20px;
    }

    h1, p {
        text-align: center;
    }

    form {
        background: white;
        max-width: 500px;
        margin: auto;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    form label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }

    form input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
    }

    span {
        margin-left: 20px;
        color: red;
        font-size: 12px;
    }

    button {
        margin-top: 20px;
        padding: 10px 15px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    button[type="submit"] {
        background-color: #28a745;
        color: white;
    }

    button[type="reset"] {
        background-color: #dc3545;
        color: white;
        margin-left: 10px;
    }

    #resultado {
        max-width: 500px;
        margin: 20px auto;
    }
</style>

<body>
    <h1>Formulário de Cadastro</h1>
    <p>Preencha todos os campos e clique em Enviar.</p>
    <form id="formulario">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: Maria Silva">
        <span id="erro-nome"></span>

        <br>
        <br>

        <label for="email">E-mail:</label>
        <input type="text" id="email" name="email" placeholder="Ex: maria@email.com">
        <span id="erro-email"></span>

        <br>
        <br>
        
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres">
        
        <br>
        
        <label for="confirma_senha">Confirmar senha:</label>
        <input type="password" id="confirma_senha" name="confirma_senha" placeholder="Repita a senha">
        <span id="erro-senha"></span>
        
        <br>
        <br>
        
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Ex: 000.000.000-00" maxlength="14">
        <span id="erro-cpf"></span>
        
        <br>
        <br>
        
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="telefone" placeholder="Ex: (11) 99999-9999" maxlength="15">
        <span id="erro-telefone"></span>
        
        <br>
        <br>
        
        <label for="cep">CEP:</label>
        <input type="text" id="cep" name="cep" placeholder="Ex: 01310-100" maxlength="9">
        <span id="erro-cep"></span>
        
        <br>
        <br>
        
        <label for="data_nascimento">Data:</label>
        <input type="text" id="data_nascimento" name="data_nascimento" placeholder="Ex: 31/12/1990" maxlength="10">
        <span id="erro-data_nascimento"></span>
        
        <br>
        <br>
        
        <label for="valor">Valor:</label>
        <input type="text" id="valor" name="valor" placeholder="Ex: 1.299,90">
        <span id="erro-valor"></span>
        
        <br>
        <br>
        
        <label for="url">URL:</label>
        <input type="text" id="url" name="url" placeholder="Ex: https://meusite.com.br">
        <span id="erro-url"></span>
        
        <br>
        <br>
        
        <label for="cartao">Número do cartão:</label>
        <input type="text" id="cartao" name="cartao" placeholder="Ex: 4111 1111 1111 1111" maxlength="19">
        <span id="erro-cartao"></span>
        
        <br>
        <br>
        
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>
    <hr>
    <div id="resultado"></div>
</body>
    <script src="script.js"></script>
</html>
